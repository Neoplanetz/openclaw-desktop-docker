# ============================================================
# docker-compose.yml — OpenClaw Desktop Environment
# ============================================================
# User/password settings are in .env file (same directory).
# Edit .env and run:  docker compose up -d --build
# ============================================================

services:
  openclaw-desktop:
    image: neoplanetz/openclaw-desktop-docker:latest
    build:
      context: .
      dockerfile: Dockerfile
      args:
        OPENCLAW_VERSION: ${OPENCLAW_VERSION:-latest}
    container_name: openclaw-desktop
    hostname: openclaw

    # ── Environment ──
    environment:
      - USER=${CLAW_USER:-claw}
      - PASSWORD=${CLAW_PASSWORD:-claw1234}
      - VNC_RESOLUTION=1920x1080
      - VNC_COL_DEPTH=24
      - TZ=Asia/Seoul
      - OPENCLAW_ALLOW_INSECURE_PRIVATE_WS=1
      - OPENCLAW_BROWSER_ENABLED=${OPENCLAW_BROWSER_ENABLED:-false}
      - OPENCLAW_DISPLAY_TARGET=${OPENCLAW_DISPLAY_TARGET:-auto}
      # - OPENCLAW_X_DISPLAY=        # Hard override (e.g. :1, :10)
      # - OPENCLAW_X_AUTHORITY=      # Hard override for Xauthority path

    # ── Port mapping ──
    # Default: bind to 127.0.0.1 only — accessible from this host, not the LAN.
    # The default password (claw1234) is public, so LAN exposure with the
    # default password is unsafe. To expose on the LAN, FIRST change
    # CLAW_PASSWORD in .env, THEN swap the active block below for the
    # commented "LAN exposure" block.
    ports:
      - "127.0.0.1:6080:6080"   # NoVNC  -> http://localhost:6080/vnc.html
      - "127.0.0.1:5901:5901"   # VNC    -> VNC client
      - "127.0.0.1:3389:3389"   # RDP    -> Remote desktop
      - "127.0.0.1:18789:18789" # OpenClaw Gateway / Dashboard
      # ── LAN exposure (uncomment AFTER changing the default password) ──
      # - "6080:6080"
      # - "5901:5901"
      # - "3389:3389"
      # - "18789:18789"

    # ── Volumes (data persistence) ──
    volumes:
      - openclaw-home:/home/${CLAW_USER:-claw}

    # ── Resources ──
    shm_size: "2gb"                # Shared memory (GUI rendering)

    # ── Security (needed for browser in container) ──
    security_opt:
      - seccomp=unconfined

    restart: unless-stopped

volumes:
  openclaw-home:
    name: openclaw-home
